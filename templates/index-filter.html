    <div class="accordion" id="accordion-filter">
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="p-2 accordion-button collapsed " type="button" data-bs-toggle="collapse" data-bs-target="#collapse-filter" aria-expanded="false" aria-controls="collapse-filter">
                    Filters
                </button>
            </h2>
            <div id="collapse-filter" class="accordion-collapse collapse " >
                <div id="filter-options" class="accordion-body container text-start">                    
                    <div class="row">
                        <div class="col-12 col-lg-6">
                            <ul id="hue-type-select" class="list-group mb-2">
                                <li class="list-group-item">
                                    <input checked  class="hue-select-type form-check-input me-1" type="checkbox" value="1" id="hue-select-1">
                                    <label class="form-check-label" for="hue-select-1">Analogous<span id="hue-select-type-1"></span></label>
                                </li>
                                <li class="list-group-item">
                                    <input class="hue-select-type form-check-input me-1" type="checkbox" value="2" id="hue-select-2">
                                    <label class="form-check-label" for="hue-select-2">Complementary<span id="hue-select-type-2"></label>
                                </li>
                                <li class="list-group-item">
                                    <input class="hue-select-type form-check-input me-1" type="checkbox" value="3" id="hue-select-3">
                                    <label class="form-check-label" for="hue-select-3">First triadic<span id="hue-select-type-3"></span></label>
                                </li>
                                <li class="list-group-item">
                                    <input class="hue-select-type form-check-input me-1" type="checkbox" value="4" id="hue-select-4">
                                    <label class="form-check-label" for="hue-select-4">Second triadic<span id="hue-select-type-4"></span></label>
                                </li>
                            </ul>
                        </div>
                   
                        <div class="col-12 col-lg-6"> 
                            <div class="accordion mb-2" id="accordion-brand">
                                <div class="accordion-item">
                                    <h2 class="accordion-header">
                                        <button class="p-2 accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse-brand" aria-expanded="false" aria-controls="collapse-brand">
                                            Brands
                                        </button>
                                    </h2>
                                    <div id="collapse-brand" class="accordion-collapse collapse " >
                                        <div class="accordion-body p-0 container text-start">  
                                            <ul id="filter-brand" class="pt-1 filter-dynamic border-0 list-group">
                                                <li hidden class="template border-0 pb-1 pt-0 list-group-item">
                                                    <input class="template select-brand form-check-input me-1 " type="checkbox" value="0" id="brand-template">
                                                    <label class="form-check-label" for="brand-template"></label>
                                                </li>                                                
                                            </ul>
                                        </div>  
                                    </div>
                                </div>
                            </div>
                            <div class="accordion mb-2" id="accordion-brand">
                                <div class="accordion-item">
                                    <h2 class="accordion-header">
                                        <button class="p-2 accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse-relevance" aria-expanded="false" aria-controls="collapse-relevance">
                                            Relevance
                                        </button>
                                    </h2>
                                    <div id="collapse-relevance" class="accordion-collapse collapse " >
                                        <div class="accordion-body p-0 container text-start">  
                                            <form id="filter-relevance">
                                                <ul class="pt-1 border-0 list-group">
                                                    <li class="pb-1 pt-0 border-0 list-group-item">
                                                        <input class="select-relevance form-check-input me-1" type="radio" name="filter-relevance" value="90" id="relevance-90" data-threshold="90">
                                                        <label class="form-check-label" for="relevance-90">>90%</label>
                                                    </li>
                                                    <li class="pb-1 pt-0 border-0 rounded-0 list-group-item">
                                                        <input class="select-relevance form-check-input me-1" type="radio" name="filter-relevance"  value="80" id="relevance-80" data-threshold="80">
                                                        <label class="form-check-label" for="relevance-80">>80%</label>
                                                    </li>
                                                    <li class="pb-1 pt-0 border-0 rounded-0 list-group-item">
                                                        <input class="select-relevance form-check-input me-1" type="radio" name="filter-relevance" value="70" id="relevance-70" data-threshold="70">
                                                        <label class="form-check-label" for="relevance-70">>70%</label>
                                                    </li>
                                                    <li class="pb-1 pt-0 border-0 rounded-0 list-group-item">
                                                        <input checked class="select-relevance form-check-input me-1" type="radio" name="filter-relevance" value="60" id="relevance-60" data-threshold="60">
                                                        <label class="form-check-label" for="relevance-60">>60%</label>
                                                    </li> 
                                                </ul>
                                            </form> 
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>                    
                </div>
            </div>
        </div>
    </div>
